spring:
  application:
    name: skolska-platforma

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:55432/skolska_platforma}
    username: ${DB_USER:skolska}
    password: ${DB_PASS:skolska}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc.time_zone: Europe/Belgrade
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  mail:
    # Default je Mailpit kontejner iz docker-compose (lokalni razvoj bez auth-a).
    # U produkciji se sve override-uje kroz MAIL_* env varijable.
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_AUTH:false}
          starttls.enable: ${MAIL_STARTTLS:false}
          starttls.required: ${MAIL_STARTTLS_REQUIRED:false}
          ssl.trust: ${MAIL_SSL_TRUST:}
          debug: ${MAIL_DEBUG:false}
          connectiontimeout: ${MAIL_CONNECT_TIMEOUT:15000}
          timeout: ${MAIL_TIMEOUT:30000}
          writetimeout: ${MAIL_WRITE_TIMEOUT:15000}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  threads:
    virtual:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: ${JWT_SECRET:promeni-ovaj-tajni-kljuc-najmanje-32-karaktera-dugacak!!}
    issuer: skolska-platforma
    access-token-expiration-minutes: ${JWT_ACCESS_EXP:15}
    refresh-token-expiration-days: ${JWT_REFRESH_EXP:7}
  storage:
    base-dir: ${STORAGE_DIR:./storage}
  async:
    core-pool-size: 4
    max-pool-size: 16
    queue-capacity: 100
  mail:
    # From adresa za sve odlazne mail-ove. Format moze biti "ime <adresa>"
    # ili samo adresa. Ako nije postavljen, fallback je MAIL_USER (Spring
    # default ponasanje vraca username kao envelope sender).
    #
    # VAZNO za Gmail: ako MAIL_FROM adresa nije ista kao MAIL_USER, Gmail ce
    # mail prepustiti ali primaoci ce ga skoro sigurno tretirati kao spam
    # (DKIM/SPF check ne prolazi za drugi domen). Resenje: postavi MAIL_FROM
    # na istu adresu kao MAIL_USER, a u MAIL_REPLY_TO stavi zeljenu adresu.
    from: ${MAIL_FROM:}
    # Reply-To header: ako primalac klikne "Reply", odgovor ide na ovu adresu
    # (ne na From). Korisno kad From mora biti gmail/workspace, ali zelis
    # odgovori da idu na poseban no-reply ili domain mail.
    reply-to: ${MAIL_REPLY_TO:}

logging:
  level:
    rs.skola.platforma: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
